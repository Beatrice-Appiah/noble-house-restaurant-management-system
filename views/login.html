<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Noble House RMS | Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="header">
    Noble House Restaurant Management System
  </div>

  <div class="container">
    <h2 style="text-align:center; margin-bottom:20px;">Staff Login</h2>

    <form class="login-form" method="POST" action="/login">
      <input 
        type="text" 
        name="username" 
        placeholder="Username" 
        required
      >

      <input 
        type="password" 
        name="password" 
        placeholder="Password" 
        required
      >

      <button type="submit">Login</button>
    </form>

    <p style="text-align:center; margin-top:15px; color:#777;">
      Authorized staff only
    </p>
  </div>

</body>
</html>
